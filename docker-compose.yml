services:
  retailcore-db:
    image: postgres:16-alpine
    container_name: retailcore-db
    environment:
      POSTGRES_DB: retailcore
      POSTGRES_USER: retailcore
      POSTGRES_PASSWORD: retailcore
    ports:
      - "5432:5432"
    volumes:
      - retailcore-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailcore -d retailcore"]
      interval: 5s
      timeout: 5s
      retries: 10

  retailcore-redis:
    image: redis:7-alpine
    container_name: retailcore-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  retailcore-pgdata:
